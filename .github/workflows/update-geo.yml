name: Update geo files

on:
  schedule:
    - cron: "0 */6 * * *"   # ad/RU lists move a few times a day; 6h is ample
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build slim geosite + fetch geoip
        run: python3 scripts/build_geo.py --config sources.json --out-geosite geosite.dat.new --out-geoip geoip.dat.new

      - name: Guard — fail if any profile category is missing/empty
        run: python3 scripts/check_geo.py geosite.dat.new geoip.dat.new

      - name: Detect changes
        id: check
        run: |
          changed=false
          for f in geoip.dat geosite.dat; do
            if [ ! -f "$f" ] || ! cmp -s "$f" "$f.new"; then changed=true; fi
          done
          echo "changed=$changed" >> "$GITHUB_OUTPUT"

      - name: Archive previous
        if: steps.check.outputs.changed == 'true'
        run: |
          d="archive/$(date -u +%Y-%m-%d)"
          mkdir -p "$d"
          for f in geoip.dat geosite.dat; do [ -f "$f" ] && cp "$f" "$d/"; done

      - name: Promote
        if: steps.check.outputs.changed == 'true'
        run: |
          mv geoip.dat.new geoip.dat
          mv geosite.dat.new geosite.dat

      - name: Cleanup
        if: steps.check.outputs.changed != 'true'
        run: rm -f geoip.dat.new geosite.dat.new

      - name: Commit & push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add geoip.dat geosite.dat archive/
          git commit -m "geo: rebuild $(date -u +%Y-%m-%dT%H:%MZ)"
          git push

      - name: Purge jsDelivr cache
        if: steps.check.outputs.changed == 'true'
        run: |
          curl -s "https://purge.jsdelivr.net/gh/Bolt-VPN/geofiles@latest/geoip.dat"  >/dev/null
          curl -s "https://purge.jsdelivr.net/gh/Bolt-VPN/geofiles@latest/geosite.dat" >/dev/null
