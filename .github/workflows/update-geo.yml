name: Update geo files

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download latest geo files
        run: |
          REDIRECT=$(curl -sI "$SOURCE_URL" | grep -i "^location:" | tr -d '\r' | awk '{print $2}')
          B64=$(echo "$REDIRECT" | sed 's|.*onadd/||')
          GEOIP_URL=$(echo "$B64" | base64 -d | jq -r '.Geoipurl')
          GEOSITE_URL=$(echo "$B64" | base64 -d | jq -r '.Geositeurl')
          curl -fSL -o geoip.dat.new "$GEOIP_URL"
          curl -fSL -o geosite.dat.new "$GEOSITE_URL"
        env:
          SOURCE_URL: ${{ secrets.SOURCE_URL }}

      - name: Check for changes
        id: check
        run: |
          changed=false
          for f in geoip.dat geosite.dat; do
            if [ ! -f "$f" ] || ! cmp -s "$f" "$f.new"; then
              changed=true
            fi
          done
          echo "changed=$changed" >> "$GITHUB_OUTPUT"

      - name: Archive old files
        if: steps.check.outputs.changed == 'true'
        run: |
          date_dir="archive/$(date -u +%Y-%m-%d)"
          mkdir -p "$date_dir"
          for f in geoip.dat geosite.dat; do
            if [ -f "$f" ]; then
              cp "$f" "$date_dir/"
            fi
          done

      - name: Update current files
        if: steps.check.outputs.changed == 'true'
        run: |
          mv geoip.dat.new geoip.dat
          mv geosite.dat.new geosite.dat

      - name: Cleanup temp files
        if: steps.check.outputs.changed != 'true'
        run: rm -f geoip.dat.new geosite.dat.new

      - name: Commit & push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add geoip.dat geosite.dat archive/
          git commit -m "update geo files $(date -u +%Y-%m-%d)"
          git push
