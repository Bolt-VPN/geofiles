name: Update geo files

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download latest geo files
        run: |
          TAG_GEOIP=$(curl -s "https://api.github.com/repos/${SOURCE_GEOIP}/tags?per_page=1" | jq -r '.[0].name')
          TAG_GEOSITE=$(curl -s "https://api.github.com/repos/${SOURCE_GEOSITE}/tags?per_page=1" | jq -r '.[0].name')
          curl -fSL -o geoip.dat.new "https://cdn.jsdelivr.net/gh/${SOURCE_GEOIP}@${TAG_GEOIP}/release/geoip.dat"
          curl -fSL -o geosite.dat.new "https://cdn.jsdelivr.net/gh/${SOURCE_GEOSITE}@${TAG_GEOSITE}/release/geosite.dat"
        env:
          SOURCE_GEOIP: ${{ secrets.SOURCE_GEOIP }}
          SOURCE_GEOSITE: ${{ secrets.SOURCE_GEOSITE }}

      - name: Check for changes
        id: check
        run: |
          changed=false
          for f in geoip.dat geosite.dat; do
            if [ ! -f "$f" ] || ! cmp -s "$f" "$f.new"; then
              changed=true
            fi
          done
          echo "changed=$changed" >> "$GITHUB_OUTPUT"

      - name: Archive old files
        if: steps.check.outputs.changed == 'true'
        run: |
          date_dir="archive/$(date -u +%Y-%m-%d)"
          mkdir -p "$date_dir"
          for f in geoip.dat geosite.dat; do
            if [ -f "$f" ]; then
              cp "$f" "$date_dir/"
            fi
          done

      - name: Update current files
        if: steps.check.outputs.changed == 'true'
        run: |
          mv geoip.dat.new geoip.dat
          mv geosite.dat.new geosite.dat

      - name: Cleanup temp files
        if: steps.check.outputs.changed != 'true'
        run: rm -f geoip.dat.new geosite.dat.new

      - name: Commit & push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add geoip.dat geosite.dat archive/
          git commit -m "update geo files $(date -u +%Y-%m-%d)"
          git push
